<app-page-layout title="Invoice Records" subtitle="Extracted data from invoice documents in this category.">
  <ng-container actions>
    <a class="btn btn-sm btn-outline-secondary" routerLink="/documents">
      <i class="bi bi-arrow-left me-1"></i> Documents
    </a>
  </ng-container>

  @if (store.error()) {
    <div class="alert alert-danger">{{ store.error() }}</div>
  }

  <app-data-table
    [columns]="columns()"
    [data]="store.records()"
    [loading]="store.loading()"
    [pageSize]="pageSize"
    [showPagination]="false"
    [controlledPage]="page()"
    (stateChange)="onStateChange($event)"
    emptyMessage="No invoice records found for this category."
  />

  <app-divider spacing="sm" thickness="0px" />

  <app-pagination
    [page]="page()"
    [pageCount]="pageCount()"
    [total]="total()"
    [pageSize]="pageSize"
    (pageChange)="page.set($event)"
  />
</app-page-layout>

<!-- Confidence badge -->
<ng-template #confidenceTpl let-value>
  @if (value === 'HIGH') {
    <span class="badge bg-success">High</span>
  } @else if (value === 'MEDIUM') {
    <span class="badge bg-warning text-dark">Medium</span>
  } @else if (value === 'LOW') {
    <span class="badge bg-danger">Low</span>
  }
</ng-template>

<!-- Actions cell -->
<ng-template #actionsTpl let-row="row">
  <div class="d-flex justify-content-center gap-2">
    <app-btn size="sm" variant="outline-success" icon="bi-receipt" [iconOnly]="true"
             title="View Invoice" (btnClick)="viewDetail(row)" />
    <app-btn size="sm" variant="outline-danger" icon="bi-trash" [iconOnly]="true"
             title="Delete" (btnClick)="confirmDelete(row)" />
  </div>
</ng-template>
