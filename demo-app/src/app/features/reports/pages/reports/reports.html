<app-page-layout title="Reports" subtitle="Analytics and usage overview for documents, users, and roles.">

  @if (loading()) {
    <div class="d-flex justify-content-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>
  } @else if (error()) {
    <div class="alert alert-danger d-flex align-items-center gap-2">
      <i class="bi bi-exclamation-circle-fill"></i>
      Failed to load report data: {{ error() }}
    </div>
  } @else {

    <!-- Row 1: Upload trend (full width) -->
    <div class="row g-4 mb-4">
      <div class="col-12">
        <div class="card shadow-sm p-3">
          <app-hc-chart [options]="uploadTrendOptions()" height="300px" />
        </div>
      </div>
    </div>

    <!-- Row 2: Documents per category + Role distribution -->
    <div class="row g-4 mb-4">
      <div class="col-12 col-lg-7">
        <div class="card shadow-sm p-3 h-100">
          <app-hc-chart [options]="docsPerCategoryOptions()" height="300px" />
        </div>
      </div>
      <div class="col-12 col-lg-5">
        <div class="card shadow-sm p-3 h-100">
          <app-hc-chart [options]="roleDistributionOptions()" height="300px" />
        </div>
      </div>
    </div>

    <!-- Row 3: Storage by category + summary stats -->
    <div class="row g-4">
      <div class="col-12 col-lg-8">
        <div class="card shadow-sm p-3">
          <app-hc-chart [options]="storageByCategoryOptions()" height="260px" />
        </div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="d-flex flex-column gap-3 h-100">
          <div class="card shadow-sm p-3 text-center flex-fill">
            <div class="fs-1 fw-bold text-primary">{{ totalDocs() }}</div>
            <div class="text-muted small">Total Documents</div>
          </div>
          <div class="card shadow-sm p-3 text-center flex-fill">
            <div class="fs-1 fw-bold text-success">{{ totalCategories() }}</div>
            <div class="text-muted small">Categories</div>
          </div>
          <div class="card shadow-sm p-3 text-center flex-fill">
            <div class="fs-1 fw-bold text-warning">{{ totalUsers() }}</div>
            <div class="text-muted small">Total Users</div>
          </div>
          <div class="card shadow-sm p-3 text-center flex-fill">
            <div class="fs-1 fw-bold text-danger">{{ totalStorageMb() }}</div>
            <div class="text-muted small">Total Storage</div>
          </div>
        </div>
      </div>
    </div>

  }

</app-page-layout>
