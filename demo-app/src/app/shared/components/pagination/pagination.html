@if (pageCount() > 0) {
  <div class="pgn">

    <!-- Record summary (optional) -->
    @if (startRow() !== null) {
      <small class="pgn__summary text-muted">
        Showing {{ startRow() }}–{{ endRow() }} of {{ total() }} records
      </small>
    }

    <!-- Page controls -->
    @if (pageCount() > 1) {
      <nav aria-label="Pagination">
        <ul class="pagination pagination-sm mb-0">

          <!-- Previous -->
          <li class="page-item" [class.disabled]="page() === 1">
            <button class="page-link" type="button" [disabled]="page() === 1 || null" (click)="go(page() - 1)">
              <i class="bi bi-chevron-left"></i>
            </button>
          </li>

          <!-- Page numbers + ellipsis -->
          @for (item of visiblePages(); track $index) {
            @if (isEllipsis(item)) {
              <li class="page-item disabled pgn__ellipsis">
                <span class="page-link">…</span>
              </li>
            } @else {
              <li class="page-item" [class.active]="item === page()">
                <button class="page-link" type="button" (click)="go(item)">{{ item }}</button>
              </li>
            }
          }

          <!-- Next -->
          <li class="page-item" [class.disabled]="page() === pageCount()">
            <button class="page-link" type="button" [disabled]="page() === pageCount() || null" (click)="go(page() + 1)">
              <i class="bi bi-chevron-right"></i>
            </button>
          </li>

        </ul>
      </nav>
    }

  </div>
}
