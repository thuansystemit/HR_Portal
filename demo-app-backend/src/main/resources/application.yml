spring:
  application:
    name: demo-app-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:demo}?prepareThreshold=0
    username: ${DB_USER:demo}
    password: ${DB_PASS:demo}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers
  endpoint:
    health:
      probes:
        enabled: true
    loggers:
      enabled: true

logging:
  level:
    com.demo: INFO
    org.springframework.security: WARN
    net.logstash.logback: WARN

app:
  jwt:
    access-expiry-seconds: ${JWT_ACCESS_EXPIRY:900}
    refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY:604800}
    keystore:
      path: ${JWT_KEYSTORE_PATH:}              # Mount as Docker/K8s secret; empty = ephemeral (dev only)
      password: ${JWT_KEYSTORE_PASSWORD:changeit}
      alias: ${JWT_KEYSTORE_ALIAS:hrportal-jwt}
  session:
    idle-timeout-seconds: ${SESSION_IDLE_TIMEOUT:1800}   # 30 min (FedRAMP AC-11 max)
    max-concurrent: ${SESSION_MAX_CONCURRENT:5}           # AC-10 concurrent session cap
    ip-binding:
      enabled: ${SESSION_IP_BINDING_ENABLED:false}        # SC-23: set true in prod for non-mobile deployments
  cookie:
    secure: ${COOKIE_SECURE:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  storage:
    upload-dir: ${UPLOAD_DIR:/app/uploads}
  cv:
    output-dir: ${CV_OUTPUT_DIR:/app/output}
  internal:
    api-key: ${INTERNAL_API_KEY:}
  malware:
    scan:
      enabled: ${MALWARE_SCAN_ENABLED:false}        # set true in prod when ClamAV sidecar present
      clamd-host: ${CLAMD_HOST:localhost}
      clamd-port: ${CLAMD_PORT:3310}
      timeout-ms: ${MALWARE_SCAN_TIMEOUT_MS:5000}
      fail-open: ${MALWARE_SCAN_FAIL_OPEN:false}    # false = fail-closed (FedRAMP SI-3 default)
  encryption:
    pii-key: ${PII_ENCRYPTION_KEY:}                 # 64 hex chars = AES-256 key; empty = ephemeral (dev only, SC-28)
  password:
    history:
      count: ${PASSWORD_HISTORY_COUNT:5}          # IA-5(1)(h): number of previous passwords to block reuse of
    max-age-days: ${PASSWORD_MAX_AGE_DAYS:60}     # IA-5(1)(d): force password rotation after this many days
    min-age-days: ${PASSWORD_MIN_AGE_DAYS:1}      # IA-5(1)(b): minimum days before a password may be changed again
  data:
    retention:
      cv-days: ${CV_RETENTION_DAYS:1095}          # SI-12: anonymise CV PII after this many days (default 3 years)
  audit:
    retention:
      online-days: ${AUDIT_RETENTION_DAYS:365}      # AU-11: events older than this are archived and purged
    archive-path: ${AUDIT_ARCHIVE_PATH:/app/audit-archives}
  account:
    inactivity:
      deactivate-after-days: ${ACCOUNT_INACTIVITY_DAYS:90}  # IA-4(e): deactivate accounts inactive this many days
  mfa:
    max-failures: ${MFA_MAX_FAILURES:5}            # AC-7: lock after this many consecutive MFA failures
    lockout-seconds: ${MFA_LOCKOUT_SECONDS:900}    # AC-7: lockout duration matches password lockout (15 min)
  security:
    enforce-config-check: ${ENFORCE_CONFIG_CHECK:false}    # CM-6: set true in prod to fail-fast on misconfiguration
    anomaly:
      enabled: ${ANOMALY_DETECTION_ENABLED:true}
      check-interval-ms: ${ANOMALY_CHECK_INTERVAL_MS:300000}  # how often to scan (default 5 min)
      window-seconds: ${ANOMALY_WINDOW_SECONDS:300}            # IR-5: sliding window for event counts
      mfa-lockout-threshold: ${ANOMALY_MFA_LOCKOUT_THRESHOLD:3}
      ip-mismatch-threshold: ${ANOMALY_IP_MISMATCH_THRESHOLD:5}
      mfa-failure-threshold: ${ANOMALY_MFA_FAILURE_THRESHOLD:10}
  incident:
    enabled: ${INCIDENT_DETECTION_ENABLED:true}
    anomaly-threshold: ${INCIDENT_ANOMALY_THRESHOLD:3}   # IR-4: number of SECURITY_ANOMALY_DETECTED events in window before raising incident
    window-seconds: ${INCIDENT_WINDOW_SECONDS:900}       # sliding window for anomaly burst detection (15 min)
    cooldown-seconds: ${INCIDENT_COOLDOWN_SECONDS:3600}  # IR-6: minimum gap between repeat notifications (1 hr)
    webhook-url: ${INCIDENT_WEBHOOK_URL:}                # IR-6: POST target (PagerDuty/Slack); empty = log-only
    check-interval-ms: ${INCIDENT_CHECK_INTERVAL_MS:900000}
  integrity:
    enabled: ${INTEGRITY_CHECK_ENABLED:false}
    manifest-path: ${INTEGRITY_MANIFEST_PATH:}          # absolute path to sha256sum-format manifest generated by CI/CD
    fail-on-violation: ${INTEGRITY_FAIL_ON_VIOLATION:false}  # SI-7: set true in prod to fail-fast on hash mismatch
  backup:
    verification:
      enabled: ${BACKUP_VERIFICATION_ENABLED:false}
      path: ${BACKUP_MANIFEST_PATH:}              # absolute path to the manifest file written by the backup script
      max-age-hours: ${BACKUP_MAX_AGE_HOURS:25}   # CP-9: alert if manifest older than this (default 25 h covers overnight window)
      cron: ${BACKUP_VERIFICATION_CRON:0 0 4 * * ?}  # default 04:00 UTC, after typical off-hours backup window
  access:
    allowed-hours:
      enabled: ${ACCESS_HOURS_ENABLED:false}               # AC-2(11): false = unrestricted (default for dev)
      start-hour: ${ACCESS_HOURS_START:0}                  # UTC hour (0–23) access window begins
      end-hour: ${ACCESS_HOURS_END:23}                     # UTC hour (0–23) access window ends (inclusive)
  saml:
    enabled: ${SAML_ENABLED:false}                         # IA-2(12)/IA-8(2): master switch for SAML2 SP; false = JWT-only (dev)
    frontend-redirect-url: ${SAML_FRONTEND_REDIRECT_URL:http://localhost:4200}  # Angular app URL to redirect after SSO
    registration-id: ${SAML_REGISTRATION_ID:logingov}
    sp-entity-id: ${SAML_SP_ENTITY_ID:}                   # e.g. https://hrportal.agency.gov/saml2/metadata
    sp-acs-url: ${SAML_SP_ACS_URL:}                       # e.g. https://hrportal.agency.gov/login/saml2/sso/logingov
    sp-signing-key-path: ${SAML_SP_SIGNING_KEY_PATH:}     # absolute path to PKCS8 RSA private key PEM (required in prod)
    sp-signing-cert-path: ${SAML_SP_SIGNING_CERT_PATH:}   # absolute path to matching X.509 certificate PEM
    idp:
      entity-id: ${SAML_IDP_ENTITY_ID:}                   # e.g. https://idp.int.identitysandbox.gov
      sso-url: ${SAML_IDP_SSO_URL:}                       # IdP redirect SSO endpoint
      metadata-url: ${SAML_IDP_METADATA_URL:}             # optional; for automatic certificate refresh
      verification-cert-path: ${SAML_IDP_CERT_PATH:}     # absolute path to IdP X.509 verification cert PEM
