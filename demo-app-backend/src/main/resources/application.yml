spring:
  application:
    name: demo-app-backend
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:demo}?prepareThreshold=0
    username: ${DB_USER:demo}
    password: ${DB_PASS:demo}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers
  endpoint:
    health:
      probes:
        enabled: true
    loggers:
      enabled: true

logging:
  level:
    com.demo: INFO
    org.springframework.security: WARN
    net.logstash.logback: WARN

app:
  jwt:
    access-expiry-seconds: ${JWT_ACCESS_EXPIRY:900}
    refresh-expiry-seconds: ${JWT_REFRESH_EXPIRY:604800}
    keystore:
      path: ${JWT_KEYSTORE_PATH:}              # Mount as Docker/K8s secret; empty = ephemeral (dev only)
      password: ${JWT_KEYSTORE_PASSWORD:changeit}
      alias: ${JWT_KEYSTORE_ALIAS:hrportal-jwt}
  session:
    idle-timeout-seconds: ${SESSION_IDLE_TIMEOUT:1800}   # 30 min (FedRAMP AC-11 max)
    max-concurrent: ${SESSION_MAX_CONCURRENT:5}           # AC-10 concurrent session cap
  cookie:
    secure: ${COOKIE_SECURE:false}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  storage:
    upload-dir: ${UPLOAD_DIR:/app/uploads}
  cv:
    output-dir: ${CV_OUTPUT_DIR:/app/output}
  internal:
    api-key: ${INTERNAL_API_KEY:}
  malware:
    scan:
      enabled: ${MALWARE_SCAN_ENABLED:false}        # set true in prod when ClamAV sidecar present
      clamd-host: ${CLAMD_HOST:localhost}
      clamd-port: ${CLAMD_PORT:3310}
      timeout-ms: ${MALWARE_SCAN_TIMEOUT_MS:5000}
      fail-open: ${MALWARE_SCAN_FAIL_OPEN:false}    # false = fail-closed (FedRAMP SI-3 default)
  encryption:
    pii-key: ${PII_ENCRYPTION_KEY:}                 # 64 hex chars = AES-256 key; empty = ephemeral (dev only, SC-28)
  password:
    history:
      count: ${PASSWORD_HISTORY_COUNT:5}          # IA-5(1)(h): number of previous passwords to block reuse of
    max-age-days: ${PASSWORD_MAX_AGE_DAYS:60}     # IA-5(1)(d): force password rotation after this many days
    min-age-days: ${PASSWORD_MIN_AGE_DAYS:1}      # IA-5(1)(b): minimum days before a password may be changed again
  data:
    retention:
      cv-days: ${CV_RETENTION_DAYS:1095}          # SI-12: anonymise CV PII after this many days (default 3 years)
  audit:
    retention:
      online-days: ${AUDIT_RETENTION_DAYS:365}      # AU-11: events older than this are archived and purged
    archive-path: ${AUDIT_ARCHIVE_PATH:/app/audit-archives}
  account:
    inactivity:
      deactivate-after-days: ${ACCOUNT_INACTIVITY_DAYS:90}  # IA-4(e): deactivate accounts inactive this many days
  mfa:
    max-failures: ${MFA_MAX_FAILURES:5}            # AC-7: lock after this many consecutive MFA failures
    lockout-seconds: ${MFA_LOCKOUT_SECONDS:900}    # AC-7: lockout duration matches password lockout (15 min)
  security:
    enforce-config-check: ${ENFORCE_CONFIG_CHECK:false}    # CM-6: set true in prod to fail-fast on misconfiguration
