name: Backend CI

on:
  push:
    branches: [master]
    paths:
      - 'demo-app-backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'demo-app-backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo-app-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build, test & verify
        run: mvn -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: demo-app-backend/target/site/jacoco/
          retention-days: 14

      - name: Upload JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: demo-app-backend/target/*.jar
          retention-days: 14
