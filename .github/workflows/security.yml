name: Security Scanning

on:
  push:
    branches: [main, master, release/**]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Weekly Monday 6 AM UTC (RA-5 continuous monitoring)

# Least-privilege defaults — individual jobs escalate only what they need.
permissions:
  contents: read

jobs:
  # ── SCA: Dependency vulnerabilities (RA-5, SI-2) ─────────────────────────
  sca:
    name: Dependency Check (OWASP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: OWASP Dependency-Check
        working-directory: demo-app-backend
        run: mvn dependency-check:check -DnvdApiKey=${{ secrets.NVD_API_KEY }} -DfailBuildOnCVSS=7
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: demo-app-backend/target/dependency-check-report.html
          retention-days: 90

  # ── SAST: Source code analysis (SI-2) ────────────────────────────────────
  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security tab
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          semgrep \
            --config p/java \
            --config p/spring \
            --config p/owasp-top-ten \
            --config p/secrets \
            --sarif \
            --output semgrep.sarif \
            demo-app-backend/src
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        # Fork PRs cannot write security-events — skip upload rather than fail the run
        if: always() && github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

  # ── Container scanning (SI-2) ────────────────────────────────────────────
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      - name: Build JAR
        working-directory: demo-app-backend
        run: |
          docker run --rm \
            -v "$(pwd)":/app \
            -w /app \
            maven:3.9-eclipse-temurin-21 \
            mvn package -DskipTests -q

      - name: Build Docker image
        working-directory: demo-app-backend
        run: docker build -t hrportal-backend:${{ github.sha }} .

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hrportal-backend:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
        if: always() && github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

  # ── Frontend dependency audit ─────────────────────────────────────────────
  frontend-audit:
    name: NPM Audit (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: demo-app/package-lock.json

      - name: Install dependencies
        working-directory: demo-app
        run: npm ci

      - name: NPM audit
        working-directory: demo-app
        run: npm audit --audit-level=high

  # ── DAST: Runtime scanning on main only (RA-5) ───────────────────────────
  dast:
    name: DAST (ZAP Baseline)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: [sca, sast, container-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Start app stack
        run: docker compose -f docker-compose.yml up -d
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/actuator/health && break || sleep 5
          done

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: http://localhost:8080
          fail_action: true
          artifact_name: zap-report

      - name: Tear down
        if: always()
        run: docker compose down -v
